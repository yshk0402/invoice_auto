<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Auto Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <main id="main" class="app-shell">
      <header class="hero">
        <p class="eyebrow">Expense Submission PoC</p>
        <h1>Invoice Auto Demo</h1>
        <p id="hero-copy" class="hero-copy"></p>
      </header>

      <section class="phone-frame" aria-labelledby="flow-title">
        <div class="phone-header">
          <h2 id="flow-title">Mobile Flow</h2>
          <button id="logout-button" class="ghost-button hidden" type="button"></button>
        </div>

        <div id="status-banner" class="status-banner" aria-live="polite"></div>

        <section id="screen-login" class="screen" aria-labelledby="login-title">
          <h3 id="login-title"></h3>
          <p id="login-copy" class="screen-copy"></p>

          <form id="login-form" class="stack" novalidate>
            <div class="field">
              <label for="language-select" id="language-label"></label>
              <select id="language-select" name="language"></select>
            </div>

            <div class="field">
              <label for="employee-id" id="employee-label"></label>
              <input id="employee-id" name="employeeId" autocomplete="username" />
            </div>

            <div class="field">
              <label for="password" id="password-label"></label>
              <input id="password" name="password" type="password" autocomplete="current-password" />
            </div>

            <button id="login-submit" class="primary-button" type="submit"></button>
          </form>

          <section class="hint-card" aria-labelledby="demo-account-title">
            <h4 id="demo-account-title"></h4>
            <ul id="demo-account-list" class="account-list"></ul>
          </section>
        </section>

        <section id="screen-camera" class="screen hidden" aria-labelledby="camera-title">
          <h3 id="camera-title"></h3>
          <p id="camera-copy" class="screen-copy"></p>

          <form id="camera-form" class="stack" novalidate>
            <div class="field">
              <label for="receipt-file" id="receipt-label"></label>
              <input id="receipt-file" name="receiptFile" type="file" accept="image/*" capture="environment" />
            </div>

            <figure id="preview-card" class="preview-card hidden">
              <img id="receipt-preview" alt="" />
              <figcaption id="preview-caption"></figcaption>
            </figure>

            <div class="button-row">
              <button id="back-to-login" class="ghost-button" type="button"></button>
              <button id="scan-submit" class="primary-button" type="submit" disabled></button>
            </div>
          </form>
        </section>

        <section id="screen-correction" class="screen hidden" aria-labelledby="correction-title">
          <h3 id="correction-title"></h3>
          <p id="correction-copy" class="screen-copy"></p>

          <div id="ocr-loading" class="loading-card hidden" aria-live="polite"></div>

          <form id="correction-form" class="stack hidden" novalidate>
            <div class="field-grid">
              <div class="field">
                <label for="field-date" id="date-label"></label>
                <input id="field-date" name="date" type="date" required />
              </div>

              <div class="field">
                <label for="field-amount" id="amount-label"></label>
                <input id="field-amount" name="amount" type="number" min="1" step="1" required />
              </div>
            </div>

            <div class="field">
              <label for="field-merchant" id="merchant-label"></label>
              <input id="field-merchant" name="merchant" required />
            </div>

            <div class="field">
              <label for="field-category" id="category-label"></label>
              <select id="field-category" name="expenseCategory" required></select>
            </div>

            <div class="summary-card">
              <h4 id="payload-title"></h4>
              <dl class="summary-list">
                <div>
                  <dt id="summary-submitter-label"></dt>
                  <dd id="summary-submitter"></dd>
                </div>
                <div>
                  <dt id="summary-language-label"></dt>
                  <dd id="summary-language"></dd>
                </div>
                <div>
                  <dt id="summary-image-label"></dt>
                  <dd id="summary-image"></dd>
                </div>
              </dl>
            </div>

            <div class="button-row">
              <button id="back-to-camera" class="ghost-button" type="button"></button>
              <button id="submit-receipt" class="primary-button" type="submit"></button>
            </div>
          </form>
        </section>

        <section id="screen-success" class="screen hidden" aria-labelledby="success-title">
          <h3 id="success-title"></h3>
          <p id="success-copy" class="screen-copy"></p>

          <div class="success-panel">
            <h4 id="latest-submission-title"></h4>
            <pre id="latest-submission" class="code-block"></pre>
          </div>

          <div class="button-row">
            <button id="submit-another" class="primary-button" type="button"></button>
            <button id="reset-demo" class="ghost-button" type="button"></button>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
